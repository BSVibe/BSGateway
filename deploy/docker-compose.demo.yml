# =============================================================================
# BSGateway Demo Stack
# =============================================================================
# Public interactive demo deployment.
#
# - Per-visitor ephemeral tenants (auto-created on /api/v1/demo/session)
# - Separate JWT issuer (DEMO_JWT_SECRET, NOT prod auth.bsvibe.dev)
# - Separate PG instance (port 5933) — isolated from prod
# - Separate Redis (port 6880)
# - External LLM calls blocked at demo-guard layer; LiteLLM mock_response only
#
# Ports (see ~/Works/_infra/port-map.md):
#   APP   4500
#   PG    5933
#   REDIS 6880
#
# Domain: api-demo-gateway.bsvibe.dev → localhost:4500 (via Caddy)
#
# Usage:
#   docker compose -f deploy/docker-compose.demo.yml --env-file deploy/.env.demo up -d
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    logging: *default-logging
    image: postgres:16-alpine
    container_name: bsgateway-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bsgateway_demo}
      POSTGRES_USER: ${POSTGRES_USER:-bsgateway_demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5933:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bsgateway_demo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - bsgateway-demo-network

  redis:
    logging: *default-logging
    image: redis:7-alpine
    container_name: bsgateway-demo-redis
    restart: unless-stopped
    command: >
      sh -c '[ -n "$$REDIS_PASSWORD" ] && exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 128mb --maxmemory-policy allkeys-lru || exec redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6880:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD --no-auth-warning} ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - bsgateway-demo-network

  app:
    logging: *default-logging
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bsgateway-demo-app
    restart: unless-stopped
    ports:
      - "4500:8000"
    env_file: .env.demo
    environment:
      GATEWAY_CONFIG_PATH: /app/gateway.yaml
      PYTHONPATH: /app
      BSVIBE_DEMO_MODE: "true"
      DEMO_JWT_SECRET: ${DEMO_JWT_SECRET:?DEMO_JWT_SECRET is required for demo backend}
      COLLECTOR_DATABASE_URL: postgresql://${POSTGRES_USER:-bsgateway_demo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bsgateway_demo}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      FRONTEND_DIST_DIR: /app/frontend/dist
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ../logs-demo:/app/logs
    networks:
      - bsgateway-demo-network

volumes:
  postgres-data:
    name: bsgateway-demo-postgres-data
  redis-data:
    name: bsgateway-demo-redis-data

networks:
  bsgateway-demo-network:
    driver: bridge
    name: bsgateway-demo-network
