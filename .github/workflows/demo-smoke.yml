name: Demo smoke

# Boots demo backend (Docker) + builds & serves demo frontend, then runs
# the @bsvibe/demo Playwright suite against the integrated stack.
# Catches integration bugs that build-only CI misses.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  demo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COMPOSE_PROJECT: bsgateway-demo-ci
      BACKEND_PORT: '4500'
      FRONTEND_PORT: '3000'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Generate ephemeral demo secrets + export to GITHUB_ENV
        run: |
          {
            echo "DEMO_JWT_SECRET=$(openssl rand -hex 32)"
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)"
            echo "REDIS_PASSWORD=$(openssl rand -hex 16)"
            echo "ENCRYPTION_KEY=$(openssl rand -hex 32)"
            echo "LITELLM_MASTER_KEY=$(openssl rand -hex 32)"
            echo "CORS_ALLOWED_ORIGINS=http://localhost:3000"
            echo "LOG_LEVEL=INFO"
          } | tee deploy/.env.demo >> "$GITHUB_ENV"

      - name: Boot demo backend stack
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            up -d --build --wait
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 2 "http://localhost:${BACKEND_PORT}/health"; then
              echo "backend healthy"
              break
            fi
            sleep 2
          done

      - name: Frontend deps
        working-directory: frontend
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build frontend in demo mode
        working-directory: frontend
        env:
          NEXT_PUBLIC_BSVIBE_DEMO: '1'
          NEXT_PUBLIC_API_URL: http://localhost:4500
        run: |
          pnpm run build
          echo "::group::dist/ root listing"
          ls -la dist | head -30
          echo "::endgroup::"
          echo "::group::dist/index.html head (if exists)"
          head -c 300 dist/index.html 2>&1 || echo "MISSING"
          echo "::endgroup::"

      - name: Start frontend in background
        working-directory: frontend
        run: |
          # Static export lives in dist/. Both `serve` and `http-server`
          # via `pnpm exec` ended up serving the .next/ build-cache
          # directory in this Linux runner — page snapshots showed
          # cache/, server/, static/ instead of dist/'s 404, _next,
          # api-keys… Pass an absolute path AND cd into dist/ before
          # exec to remove every layer of resolution ambiguity.
          test -f dist/index.html || { echo "::error::dist/index.html missing"; ls -la dist | head -20; exit 1; }
          DIST_ABS="$(pwd)/dist"
          echo "DIST_ABS=$DIST_ABS"
          ls -la "$DIST_ABS" | head -5
          realpath "$DIST_ABS"
          # Also list what dist content the node binary actually sees
          node -e "console.log(require('fs').readdirSync(process.argv[1]).slice(0, 8))" "$DIST_ABS"
          (cd "$DIST_ABS" && nohup node ../node_modules/http-server/bin/http-server . -p "$FRONTEND_PORT" -s --silent > /tmp/frontend.log 2>&1 &)
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 2 "http://localhost:${FRONTEND_PORT}/"; then
              echo "frontend ready"
              break
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run demo smoke suite
        working-directory: frontend
        env:
          DEMO_E2E_BASE_URL: http://localhost:3000
          DEMO_E2E_API_URL: http://localhost:4500
        run: pnpm exec playwright test --grep @demo --project=chromium

      - name: Frontend log (on failure)
        if: failure()
        run: tail -200 /tmp/frontend.log || true

      - name: Upload Playwright trace + screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

      - name: Demo backend logs (on failure)
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            logs --tail=200 app
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            logs --tail=50 postgres redis

      - name: Tear down
        if: always()
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            down -v
